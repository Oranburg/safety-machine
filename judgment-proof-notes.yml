site_building_notes:
  interactive_elements:
    - name: "Deskilling Loop Simulator"
      concept: >
        8-10 round game. Institution starts with Judgment Capacity 100,
        Compliance Coverage 50. Each round: exercise judgment (risky) or
        write a rule (safe but -10 judgment). Bad judgment outcomes trigger
        automatic rule-writing AND -15 judgment. Loop drives judgment to
        zero, compliance to 100. Paradox reveal at end.
      status: "designed, not yet built"
    - name: "The Two Purposes Visualization"
      concept: >
        Interactive diagram showing foundation (tikkun ha-guf) and
        scaffolding (tikkun ha-nefesh). User can add more foundation
        blocks (rules, compliance) and watch the scaffolding never get
        built. Or balance both and see a complete structure.
      status: "concept only"

  key_quotes_for_site:
    - "What is law? Baby, don't hurt me."
    - "The Safety Machine stops the grandmother and escorts the shell company to the vault."
    - "The foundation exists to make the scaffolding possible. The scaffolding is the point."
    - "You cannot define law by what it prevents any more than you can define love by what it does not do."
    - "The cost is measured in a civilization that has optimized for the prevention of hurt and has thereby prevented itself from building anything worth protecting."
    - "Haddaway's answer was not wrong. It was incomplete."
    - "The professors had confused the measurable with the manageable."
